<!-- Global Search Overlay — included once in default.html -->
<div id="searchOverlay" class="search-overlay" role="dialog" aria-modal="true" aria-label="Site search">
  <div class="search-overlay-backdrop" id="searchBackdrop"></div>
  <div class="search-overlay-panel">
    <div class="search-overlay-header">
      <div class="search-input-wrapper">
        <svg class="search-input-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/>
          <line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input
          type="text"
          id="searchOverlayInput"
          class="search-overlay-input"
          placeholder="Search CAHC — papers, books, people, posts…"
          autocomplete="off"
          spellcheck="false"
        />
        <div class="search-toggles">
          <button id="searchToggleCase" class="search-toggle" title="Case sensitive (off)" aria-pressed="false">Aa</button>
          <button id="searchToggleRegex" class="search-toggle" title="Regex (off)" aria-pressed="false">.*</button>
          <button id="searchToggleIAST" class="search-toggle" title="IAST sensitive (off)" aria-pressed="false">ā</button>
        </div>
        <kbd class="search-kbd" id="searchKbdEsc">Esc</kbd>
      </div>
    </div>
    <div class="search-overlay-body">
      <div id="searchResults" class="search-results">
        <div class="search-empty-state" id="searchEmptyState">
          <p class="search-empty-hint">Type to search across all CAHC content</p>
          <div class="search-shortcuts">
            <span><kbd>↑</kbd><kbd>↓</kbd> navigate</span>
            <span><kbd>Enter</kbd> open</span>
            <span><kbd>Esc</kbd> close</span>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
