- title:
    en: "Śrautakarmasu Vaijñānikī Dṛṣṭiḥ (Sanskrit)"
    sa: "श्रौतकर्मसु वैज्ञानिकी दृष्टिः"
  date: "2023-03-24"
  venue:
    en: "Sringeri Vedic Assembly"
    sa: "शृङ्गेरी-विद्वत्सभा"
  speaker:
    en: "Prof. R. N. Iyengar"
    sa: "प्रो. आर्. एन्. अय्यङ्गारः"
  description:
    en: "A presentation delivered in Sanskrit addressing scientific and geometric perceptions in Vedic Śrauta rituals, with a focus on Darshapurnamasa altar constructions."
    sa: "वैदिकश्रौतयज्ञेषु विज्ञानस्य भूमित्याश्च दर्शने विषये संस्कृतभाषया दत्तं व्याख्यानम्। अत्र दर्शपूर्णमासवेदिनिर्माणविषयः विशेषतः चर्चितः।"
  pdf: "/assets/talks/2023-03-24-sringeri/darsheshti.pdf"

- title:
    en: "Importance of the Legend of Dhruva for Indian Chronology"
    sa: "भारतीयकालक्रमे ध्रुवोपाख्यानस्य महत्त्वम्"
  date: "2023-02-11"
  venue:
    en: "IIT Gandhinagar"
    sa: "IIT गान्धिनगरम्"
  speaker:
    en: "Prof. R. N. Iyengar"
    sa: "प्रो. आर्. एन्. अय्यङ्गारः"
  description:
    en: "Analyzes the astronomical significance of the Dhruva/Pole Star narratives in Vedic literature to determine the chronological overlap between Vedic and Harappan eras."
    sa: "वैदिकसाहित्ये वर्णितस्य ध्रुवनक्षत्रस्य खगोलीयमहत्त्वस्य विश्लेषणम्, यत्र वैदिककालस्य हडप्पाकालस्य च पारस्परिकसम्बन्धः निर्धार्यते।"
  pdf: "/assets/talks/2023-02-11-iitg/dhruva-stratigraphy.pdf"

