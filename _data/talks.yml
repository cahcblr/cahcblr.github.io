- title:
    en: "Indian Astronomy through Observations from Ancient Periods"
    sa: "प्राचीनकालादारभ्य निरीक्षणाधारेण भारतीयखगोलशास्त्रम्"
  date: "2024-09-09"
  venue:
    en: "JU-IKS Course Lecture"
    sa: "जैनविश्वविद्यालय-भारतीयज्ञानपद्धति-पाठ्यक्रमव्याख्यानम्"
  speaker:
    en: "Sunder Chakravarty"
    sa: "सुन्दरचक्रवर्ती"
  description:
    en: "An introductory slide series on observational foundations of Indian astronomy. Focuses on the rhythms of the sun and moon, lunar months, Luni-Solar calendar systems (Panchanga, Tithi, Masa), and the axial precession dating method using nakshatra shifts."
    sa: "भारतीयखगोलशास्त्रस्य निरीक्षणमूलविषयेषु प्रारम्भिका उपस्थापना। सूर्यचन्द्रयोः गतिः, चान्द्रमासाः, पञ्चाङ्गपद्धतिः, नक्षत्रचलनेन तिथिगणना च अत्र मुख्याः विषयाः सन्ति।"
  html_slides: "/assets/talks/2024-09-09-ju-iks/ju-iks-astro-01.html"
  pdf: "/assets/talks/2024-09-09-ju-iks/ju-iks-astro-01.pdf"
  gif_demo: "/assets/talks/2024-09-09-ju-iks/seasonal_naks_drift.gif"

