- title:
    en: "Dating Maghādi and Śraviṣṭhādi Epochs"
    sa: "मघादि-श्रविष्ठादियुगयोः कालनिर्धारणम्"
  date: "2023-12-05"
  venue:
    en: "Interdisciplinary Discussion Meeting (Session 3)"
    sa: "बहुविषयीया विचारगोष्ठी (तृतीयसत्रम्)"
  speaker:
    en: "Sunder Chakravarty"
    sa: "सुन्दरचक्रवर्ती"
  description:
    en: "Explores the Nakṣatra Solar Zodiac from Vedic times, detailing the mathematical and astronomical models to date the summer and winter solstice alignments in the Vrddhagargiya Jyotisa and Brahmanda Purana."
    sa: "वैदिककालादारभ्य नक्षत्रसौरचक्रस्य अन्वेषणम्। वृद्धगार्गीयज्योतिषे ब्रह्माण्डपुराणे च वर्णितयोः दक्षिणायन-उत्तरायणसंरेखणयोः गणितीयखगोलीयप्रारूपैः कालनिर्णयः।"
