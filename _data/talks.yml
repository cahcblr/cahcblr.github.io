- title: "Tools for Ancient Indian Astronomy and Cosmography"
  date: "2026-03-23"
  venue: "National Workshop on Indian Astronomy Before Common Era (IABCE)"
  speaker: "Sunder Chakravarty"
  description: "A two-session hands-on tutorial demonstrating visual and computational tools to verify ancient Indian astronomical concepts. Session 1 covers Meru cosmography, North Celestial Pole (Dhruva) drift, and the sun's Uttarayana/Dakshinayana paths using Stellarium. Session 2 extends to lunar orbits, the equinoctial full moon search (via Astropy), and eclipse calculations."
