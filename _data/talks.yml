- title: "Indian Astronomy through Observations from Ancient Periods"
  date: "2024-09-09"
  venue: "JU-IKS Course Lecture"
  speaker: "Sunder Chakravarty"
  description: "An introductory slide series on observational foundations of Indian astronomy. Focuses on the rhythms of the sun and moon, lunar months, Luni-Solar calendar systems (Panchanga, Tithi, Masa), and the axial precession dating method using nakshatra shifts."
  html_slides: "/assets/talks/2024-09-09-ju-iks/ju-iks-astro-01.html"
  pdf: "/assets/talks/2024-09-09-ju-iks/ju-iks-astro-01.pdf"
  gif_demo: "/assets/talks/2024-09-09-ju-iks/seasonal_naks_drift.gif"

- title: "Transit of Sun through Seasonal Nakṣatras"
  date: "2024-03-17"
  venue: "Mythic Society, Bangalore"
  speaker: "Sunder Chakravarty"
  description: "Presented research conducted with Prof. R. N. Iyengar on the path of the sun through the seasonal nakshatra cycles. Details the solar epochs, equinox alignments, and their implications for establishing ancient Indian chronology."
