- title:
    en: "Tools for Ancient Indian Astronomy and Cosmography"
    sa: "प्राचीनभारतीयखगोलशास्त्राय ब्रह्माण्डविज्ञानाय च साधनानि"
  date: "2026-03-23"
  venue:
    en: "National Workshop on Indian Astronomy Before Common Era (IABCE)"
    sa: "प्राचीनकाले भारतीयखगोलशास्त्रविषये राष्ट्रिया कार्यशाला (IABCE)"
  speaker:
    en: "Sunder Chakravarty"
    sa: "सुन्दरचक्रवर्ती"
  description:
    en: "A two-session hands-on tutorial demonstrating visual and computational tools to verify ancient Indian astronomical concepts. Session 1 covers Meru cosmography, North Celestial Pole (Dhruva) drift, and the sun's Uttarayana/Dakshinayana paths using Stellarium. Session 2 extends to lunar orbits, the equinoctial full moon search (via Astropy), and eclipse calculations."
    sa: "प्राचीनभारतीयखगोलशास्त्रीयसंकल्पनानां परीक्षार्थं दृश्य-सङ्गणकसाधनानां द्विपरियोजनात्मकः पाठः। प्रथमसत्रे मेरुब्रह्माण्डं, ध्रुवनक्षत्रचलनं, उत्तरायण-दक्षिणायनमार्गश्च वर्ण्यन्ते। द्वितीयसत्रे चन्द्रकक्षा, विषुवत्कालपूर्णचन्द्रशोधनम्, ग्रहणगणना च वर्ण्यन्ते।"
  html_slides: "/assets/talks/2026-03-23-iabc/slides-session-1.html"
  html_slides_2: "/assets/talks/2026-03-23-iabc/slides-session-2.html"
