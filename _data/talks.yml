    sa: "मिथिक्-सोसैटि, बेङ्गळूरु"
  speaker:
    en: "Warija Adiga"
    sa: "वारिजा अडिगा"
  description:
    en: "An analysis of ancient Indian civil and architectural planning traditions (Vastu) based on the Vṛddhagarga Vāstuvidyā text critically edited by CAHC."
    sa: "केन्द्रेण सम्पादितस्य वृद्धगर्गवास्तुविद्याग्रन्थस्य आधारेण प्राचीनभारतीयगृहनिर्माण-नगररचनापरम्पराणां विश्लेषणम्।"
