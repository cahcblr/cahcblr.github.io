- title:
    en: "पराशरतन्त्रम् (Parāśaratantra)"
    sa: "पराशरतन्त्रम्"
  subtitle:
    en: "Reconstructed with translation and notes by Prof. R. N. Iyengar"
    sa: "अनुवादेन टिप्पणीभिः सह पुनर्निर्मितः ग्रन्थः - प्रो. आर्. एन्. अय्यङ्गारः"
  author:
    en: "Prof. R. N. Iyengar"
    sa: "प्रो. आर्. एन्. अय्यङ्गारः"
  cover_image: "/assets/pt_book_cover.jpg"
  description:
    en: |
      The 21 chapters present a compilation of Sanskrit texts by Parasara, a sage and scholar from ancient India dispersed in the commentaries of scholars such as Varāha-mihira, Utpala, Ballāla-Sena and Bhaskara-Yogi living between 6th and 13th century.

      The text is accompanied by relevant archaeo-astronomical analysis of Parāśara’s season solar zodiac and observation of the heliacal rise and set of star Agastya (Canopus).

      This reconstructed text with translation and notes by RNI is a fruition of a long journey of research and investigation into History of Science in India.
    sa: |
      एकविंशति-अध्यायात्मकोऽयं ग्रन्थः वराहमिहिर-उत्पल-बल्लाळसेन-भास्करयोगिप्रभृतीनां टीकासु विप्रकीर्णानां प्राचीनमहर्षेः पराशरस्य वचनानां सङ्ग्रहः अस्ति।

      अत्र पराशरोक्तऋतुचक्रस्य खगोलीयविश्लेषणं तथा अगस्त्यनक्षत्रस्य उदय-अस्तयोः निरीक्षणं दत्तं वर्तते। प्रो. अय्यङ्गारमहोदयस्य दीर्घकालीनशोधस्य फलरूपोऽयं ग्रन्थः भारतस्य विज्ञानस्य इतिहासे महत्त्वपूर्णां दृष्टिं ददाति।
