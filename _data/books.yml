- title:
    en: "Nalacaritam"
    sa: "नलचरितम्"
  subtitle:
    en: "Sanskrit Translation of Kanakadasa's Kannada Work"
    sa: "कनकदासस्य कन्नडकृतेः संस्कृतानुवादः"
  author:
    en: "Translated by Dr. Shankar Rajaraman"
    sa: "अनुवादकः - डॉ. शङ्करराजरामन्"
  cover_image: "/assets/nalacharitram_book_cover.jpg"
  description:
    en: |
      The Sanskrit translation of the longer **Nalacaritam**, one of the important poetic works of the great Kannada saint-poet Kanakadasa. It appears in Volume II of *The Complete Works of Kanakadasa Translated into Sanskrit*, brought out by the Saint Poet Kanakadasa and Tatvapadakarara Study Centre, Kalagrama, Bengaluru. 

      The translation preserves important features of old Kannada poetic practice such as the Bhāminī Ṣaṭpadī structure, dvitīyākṣaraprāsa, stylistic continuity, and the aesthetic movement of the original composition. The volume also includes translations of *Haribhaktisāra* and *Rāmadhānya Carite* by Śatāvadhānī Dr. R. Ganesh.
    sa: |
      महानुभावस्य कन्नडभक्तकवेः कनकदासस्य प्रमुखकाव्यकृतेः **नलचरितम्** इत्यस्य संस्कृतभाषानुवादः अस्ति। बेङ्गळूरुनगरे कनकदास-तत्वपदकार-अध्ययनकेन्द्रेण प्रकाशिते *संस्कृतानुवादयुक्ता कनकदासग्रन्थावली* इत्यस्याः द्वितीयभागे ग्रन्थोऽयं लभ्यते।

      अनुवादोऽयं प्राचीनकन्नडकाव्यपरम्परायाः भामिनीषट्पदी-रचनां, द्वितीयाक्षरप्रासं, शैलीप्रवाहं, मूलकृतेः रसात्मकताञ्च सुरक्षितां रक्षति। अस्मिन् भागे शतावधानी-डॉ-आर्-गणेशमहोदयस्य *हरिभक्तिसारः* *रामधान्यचरितं* च संस्कृतानुवादाः अपि सम्मिलिताः सन्ति।
