- title:
    en: "निपुणप्राघुणकम् (Nipuṇaprāghuṇakam)"
    sa: "निपुणप्राघुणकम्"
  subtitle:
    en: "A Sanskrit Bhāṇa"
    sa: "संस्कृतभाणरूपकम्"
  author:
    en: "Dr. Shankar Rajaraman"
    sa: "डॉ. शङ्करराजरामन्"
  cover_image: "/assets/np-book-cover.png"
  description:
    en: |
      **Nipuṇaprāghuṇakam** falls under the **Bhāṇa** genre, which is one of the ten classical forms of Sanskrit drama outlined in the **Nāṭyaśāstra**.

      Bhāṇa is considered the most challenging dramatic style in Sanskrit literature, featuring a single performer who portrays various absent characters, sustaining the story's continuity via speech, movements, and the **ākāśabhāṣita** technique—engaging in dialogue with entities not physically on stage.
    sa: |
      **निपुणप्राघुणकम्** इति नाटकं **भाण** रूपकप्रकारस्य अस्ति, यः नाट्यशास्त्रोक्तदशरूपकेषु अन्यतमः।

      भाणप्रकारः संस्कृतसाहित्ये अत्यन्तं कठिनः मन्यते, यत्र एक एव नटः आकाशभाषितमाध्यमेन विविधान् अनुपस्थितान् पात्रान् अभिनयेन वाङ्मात्रेण च दर्शयन् कथाप्रवाहं रक्षति—रङ्गमञ्चे अनुपस्थितैः जनैः सह संवादाभिनयं करोति।
