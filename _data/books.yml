- title:
    en: "भारावतारस्तवः (Bhārāvatārastava)"
    sa: "भारावतारस्तवः"
  subtitle:
    en: "A Stotra of 50 Verses"
    sa: "५० श्लोकात्मकं स्तोत्रकाव्यम्"
  author:
    en: "Dr. Shankar Rajaraman"
    sa: "डॉ. शङ्करराजरामन्"
  cover_image: "/assets/ba-cover-page.jpg"
  description:
    en: |
      In this poetic work consisting of fifty verses, the author offers praise to the Lord Śiva. Except for the final verse, which is composed in the indravajrā meter, all the verses herein are written in the vasantatilakā meter. The poet composed this hymn inspired by the style of the *Ānandasāgarastava* written by Nīlakaṇṭha. The "laying down of the burden" (*bhārāvatāra*) refers to placing a weight upon the shoulders or head of someone else. In this poem, the author casts the heavy weight of suffering caused by the bonds of worldly existence onto Lord Śiva and prays to Him, saying, "Deliver me." Whether contemplating the Deity as a friend, a master, a father, a teacher, a lover of His devotees, a refuge, the cause of dissolution, the granter of liberation, or as non-different from the self, almost all of the poet's verses shine with devotion.
    sa: |
      पञ्चाशत् श्लोकानां अस्मिन् काव्ये कविः शिवस्य स्तुतिं करोति। अन्तिमं श्लोकं विहाय अन्ये सर्वे श्लोकाः वसन्ततिलकावृत्ते लिखिताः सन्ति। नीलकण्ठदीक्षितस्य *आनन्दसागरस्तवम्* अनुसृत्य कविना अयं स्तवः विरचितः।

      *भारावतारः* नाम स्वकीयसंसारबन्धनरूपं भारं शिवस्य चरणयोः अर्पणम् अस्ति। अत्र कविः संसारक्लेशभारं शिवे अर्पयित्वा 'मामुद्धर' इति प्रार्थयते। शिवं सखा, स्वामी, पिता, गुरुः वा मत्वा कृता इयं स्तुतिः भक्तिरसेन परिपूर्णा वर्तते।
