- title:
    en: "गूढपादरामायणम् (Gūḍhapāda Rāmāyaṇam)"
    sa: "गूढपादरामायणम्"
  subtitle:
    en: "A Retelling of the Rāmāyaṇa in 181 Anuṣṭubh Verses"
    sa: "१८१ अनुष्टुप्श्लोकेषु रामायणस्य अभिनवं संक्षेपणम्"
  author:
    en: "Dr. Shankar Rajaraman"
    sa: "डॉ. शङ्करराजरामन्"
  cover_image: "/assets/gp-book-cover.jpg"
  description:
    en: |
      **Gūḍhapāda Rāmāyaṇam** is a retelling of the Rāmāyaṇa (Bālakāṇḍa through Yuddhakāṇḍa) in 181 Anuṣṭubh verses under the *gūḍhapāda* constraint: in each verse, one *pāda* (quarter-verse) is hidden inside the other three via exact syllabic frequency.

      Published by Praharsha Publications, Bengaluru (2026), this work represents the first strict execution of this classical *citrakāvya* (constrained poetry) technique at a narrative scale, observing complete phonetic integrity and positional freedom for the hidden *pāda*.
    sa: |
      **गूढपादरामायणम्** इति १८१ अनुष्टुप्श्लोकेषु बालकाण्डतः युद्धकाण्डपर्यन्तं रामायणकथायाः अभिनवप्रकारः अस्ति, यत्र गूढपादप्रतिबन्धः पालितः अस्ति: प्रत्येकस्मिन् श्लोके एकः पादः अन्येषु त्रिषु पादेषु अक्षरावृत्त्या गूढः भवति।

      प्रहर्षप्रकाशनद्वारा बेङ्गळूरुनगरे (२०२६) प्रकाशितम् इदं कार्यं प्रथमा आवृत्तिः अस्ति यत्र कथास्तरे अस्याः शास्त्रोक्तचित्रकाव्यपद्धतेः पूर्णस्वरेण अक्षरशुद्ध्या च प्रयोगः कृतः अस्ति।
