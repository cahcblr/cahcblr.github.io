title:
  en: "About the Center for Ancient History and Culture (CAHC)"
  sa: "पुरातनेतिहास-संस्कृति-केन्द्रम् (CAHC)"

intro_p:
  en: "The **Center for Ancient History and Culture (CAHC)** at Jain University is a premier research institution dedicated to the interdisciplinary study of India's ancient cultural and intellectual heritage. Established in 2011, CAHC has been recognized by the Ministry of Education, Government of India, as an **Indian Knowledge System (IKS) center** following a competitive national evaluation."
  sa: "जैनविश्वविद्यालये प्रतिष्ठितं **पुरातनेतिहास-संस्कृति-केन्द्रम् (CAHC)** भारतस्य प्राचीनसांस्कृतिक-वैचारिकपरम्पराणां बहुविषयीयानुसन्धानार्थं समर्पितं प्रमुखं शोधसंस्थानमस्ति। २०११ तमे वर्षे स्थापितम् इदं केन्द्रं राष्ट्रियस्तरीयायाः स्पर्धात्मकाङ्कनप्रक्रियायाः अनन्तरं भारतसर्वकारस्य शिक्षासन्त्रालयेन **भारतीयज्ञानपद्धति-केन्द्रम् (IKS center)** इति मान्यतां प्रापत्।"

mission:
  title:
    en: "Mission"
    sa: "ध्येयम्"
  description:
    en: "CAHC addresses the significant gap in Indian historical scholarship by presenting ancient Indian history in an objective fashion, avoiding ideological extremes. Our mission is to conduct primary research that:"
    sa: "केन्द्रमिदं वैचारिकपक्षातिरेकान् विहाय प्राचीनभारतीयइतिहासस्य वस्तुनिष्ठरूपेण उपस्थापनेन भारतीयइतिहासलेखनक्षेत्रे विद्यमानां महतीं न्यूनतां दूरीकर्तुं प्रयतते। अस्माकं लक्ष्यं तादृशं प्राथमिकानुसन्धानं कर्तुमस्ति यत्:"
  bullets:
    - en: "Chronicles cultural, scientific, and social intellectual traditions beyond political history"
      sa: "राजकीयेतिहासात् परं सांस्कृतिक-वैज्ञानिक-सामाजिक-वैचारिकपरम्पराणां निरूपणं करोति"
    - en: "Presents ancient history free from Eurocentric viewpoints"
      sa: "यूरोपीयदृष्टिकोणरहितं निष्पक्षं पुरातनेतिहासम् उपस्थापयति"
    - en: "Connects modern education with intellectual traditions rooted in ancient India"
      sa: "प्राचीनभारतीयाधारयुक्तां वैचारिकपरम्परां आधुनिकशिक्षया सह संबध्नाति"
    - en: "Preserves and studies unpublished manuscripts and ancient texts"
      sa: "अप्रकाशितमातृकाणां प्राचीनग्रन्थानां च संरक्षणं तथा च अध्ययनं करोति"

research_areas:
  title:
    en: "Research Areas"
    sa: "अनुसन्धानक्षेत्राणि"
  description:
    en: "Our center specializes in several interconnected fields:"
    sa: "अस्माकं केन्द्रं परस्परसम्बद्धेषु विविधक्षेत्रेषु विशिष्टताम् आवहति:"
  bullets:
    - en: "**Intellectual History** - Tracing the development of ideas and knowledge systems"
      sa: "**वैचारिकेतिहासः** - विचाराणां ज्ञानपद्धतीनां च विकासक्रमस्य अन्वेषणम्"
    - en: "**Cultural History** - Understanding societal practices and cultural evolution"
      sa: "**सांस्कृतिकेतिहासः** - सामाजिकप्रथानां सांस्कृतिकविकासस्य च अवगमनम्"
    - en: "**Pre-Siddhantic and Siddhantic Astronomy** - Ancient Indian astronomical sciences"
      sa: "**पूर्वसिद्धान्त-सिद्धान्तज्योतिषम्** - प्राचीनभारतीयखगोलशास्त्रविज्ञानम्"
    - en: "**Shilpashastra** - Traditional architecture and engineering texts"
      sa: "**शिल्पशास्त्रम्** - पारम्परिकस्थापत्य-अभियान्त्रिकीग्रन्थाः"
    - en: "**Sanskrit Literature, Poetry and Poetics** - Classical Sanskrit literary traditions, kāvya, and alaṃkāraśāstra"
      sa: "**संस्कृतसाहित्यं, काव्यं, अलङ्कारशास्त्रं च** - अभिजातसंस्कृतसाहित्यपरम्पराः, काव्यं, काव्यशास्त्रं च"
    - en: "**History of Music** - Ancient musical traditions and theory"
      sa: "**सङ्गीतेतिहासः** - प्राचीनासङ्गीतपरम्पराः तच्छास्त्रं च"
    - en: "**Manuscriptology** - Study and preservation of ancient manuscripts"
      sa: "**मातृकाविज्ञानम्** - अप्रकाशितहस्तलेखानां संरक्षणं तथा च अध्ययनम्"

publications:
  title:
    en: "Publications & Impact"
    sa: "प्रकाशनं प्रभावश्च"
  bullets:
    - en: "[Academic papers](/papers) published in peer-reviewed journals"
      sa: "समीक्षितपत्रिकासु प्रकाशितानि [शोधपत्राणि](/papers)"
    - en: "[Scholarly books](/books) on ancient sciences and culture"
      sa: "प्राचीनविज्ञानसंस्कृतिविषयकाः [विद्वद्ग्रन्थाः](/books)"
    - en: "International conferences and workshops"
      sa: "अन्तर्राष्ट्रियगोष्ठ्यः कार्यशालाश्च"
    - en: "Educational outreach programs"
      sa: "शैक्षणिकप्रसारकार्यक्रमाः"

leadership:
  title:
    en: "Leadership"
    sa: "नेतृत्वम्"
  p1:
    en: "The center is directed by **Dr. Shankar Rajaraman**, a Sanskrit poet, scholar of Indian Knowledge Systems, and researcher in Sanskrit poetics and psychology of emotions. He received the _Maharṣi Bādarāyaṇa Vyāsa Sammān_ from the President of India for his contributions to Sanskrit language and literature."
    sa: "केन्द्रस्यास्य निर्देशनं **डॉ. शङ्करराजरामन्-महोदयेन** क्रियते, ये खलु संस्कृतकवयः, भारतीयज्ञानपद्धतेः विद्ंवासः, संस्कृतकाव्यशास्त्रस्य भावमनोविज्ञानस्य च शोधकर्तारः सन्ति। संस्कृतभाषासाहित्ययोः उल्लेखनीययोगदानाय ते भारतस्य राष्ट्रपतिना _महर्षिबादरायणव्याससम्मानेन_ विभूषिताः।"
  p2:
    en: "The center was founded and continues to be guided by **Prof. R. N. Iyengar** (Distinguished Professor and Mentor of CAHC), a renowned scholar in ancient Indian sciences and history of astronomy, whose research has significantly contributed to understanding India's scientific and cultural heritage."
    sa: "केन्द्रस्यास्य स्थापना मार्गदर्शनं च **प्रो. आर्. एन्. अय्यङ्गार-महोदयेन** (केन्द्रस्य संरक्षकः विशिष्टप्राध्यापकश्च) कृतम्, ये प्राचीनभारतीयविज्ञानस्य खगोलशास्त्रेतिहासस्य च लब्धप्रतिष्ठाः विद्ंवासः सन्ति। तेषां अनुसन्धानकार्यं भारतस्य वैज्ञानिक-सांस्कृतिकविरासतस्य अवगमने महदुपकाराय सिद्धम्।"

