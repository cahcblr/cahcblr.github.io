- title:
    en: "Jyotiṣa Lab"
    sa: "ज्योतिष-प्रयोगशाला"
  subtitle:
    en: "Visualizing Precession and Nakshatras"
    sa: "अयनचलनस्य नक्षत्राणाञ्च दृश्यीकरणम्"
  url: "https://jyotisha-lab.netlify.app/"
  developer: "Sunder Chakravarty"
