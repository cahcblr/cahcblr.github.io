- title:
    en: "Vāgartha"
    sa: "वागर्थः"
  subtitle:
    en: "Exploring Sounds and Utterances"
    sa: "ध्वनीनां उच्चारणानाञ्च अन्वेषणम्"
  url: "https://vagartha.netlify.app/"
  developer: "Sunder Chakravarty"
  description:
    en: "A digital exploration of ancient phonetics (Śikṣā), acoustics, and the science of classical Indian utterances."
    sa: "प्राचीनशिक्षाशास्त्रं, ध्वनिविज्ञानं, पारम्परिकभारतीय-उच्चारणशास्त्रस्य च अङ्कीयसंशोधनम्।"
