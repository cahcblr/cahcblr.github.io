- name:
    en: "R N Iyengar"
    sa: "आर. एन्. अय्यङ्गारः"
  role:
    en: "Distinguished Professor and Mentor of CAHC"
    sa: "पुरातनेतिहास-संस्कृति-केन्द्रस्य विशिष्टाचार्यः मार्गदर्शकश्च"
  image: "/assets/rni.jpg"
  image_position: "center 15%"
  group: "leadership"
  bio:
    en: |
      **Prof R. N. Iyengar** is the founder and Distinguished Professor and Mentor of the Center for Ancient History and Culture (CAHC) at the [Jain University](https://www.jainuniversity.ac.in/), which he established in 2012. He continues to pursue research in Indian Knowledge Systems including the History of Science in India.

      R N Iyengar B.E., M.Sc(Eng).,Ph.D., (b. 1943) is renowned for his contributions to Earthquake Engineering, Random Vibrations, Mathematical Modeling, Structural Dynamics and Nonlinear Systems. As faculty at the Indian Institute of Science from 1969 till his retirement in 2005 as KSIDC Chair Professor in Civil Engineering, Iyengar has published 200 technical papers, reports, general articles and books. He is **Fellow of the Indian National Academy of Engineering, Indian Academy of Science, National Academy of Science** and the Alexander von Humboldt Foundation, Germany. He held the Distinguished Schmidt Chair at the Florida Atlantic University, USA in 1995. He was Director of CBRI-CSIR (1994-2000); Raja Ramanna Fellow of Dept. of Atomic Energy (2005-10). After establishing the Centre for Disaster Mitigation with a unique Fire Research Lab, he is currently Distinguished Emeritus Professor and the Director of the Center for Ancient History & Culture at the Jain University, Bangalore.

      Brought up in a family of Sanskrit scholars, Professor Iyengar received initial training in Sanskrit studies in the traditional way. This has propelled him to become an avid reader of ancient texts in the original. He has developed, combining Indic knowledge traditions with modern methods, a new line of study of ancient Indian heritage. His findings on comets, eclipses, earthquakes, ancient geography, effect of precession and the Pole Star Dhruva in Vedic literature, Concept of Probability in classical music, have attracted worldwide attention. He brought out the **Parāśaratantra**, an ancient Sanskrit treatise on astronomy and natural sciences, with text, translation and notes in 2013. Recently he has edited **Nāradaśilpaśāstram**, a medieval period text on Civil Engineering with introduction, translation and notes. He is presently critically editing **Vṛddha-gārgīya Jyotiṣa** an ancient text on astral sciences from about ten unpublished manuscripts.

      **Recent Recognition:** Prof. R. N. Iyengar was conferred the **SASTRA-Mahamana Award for Excellence in Indian Knowledge Systems** by SASTRA Deemed University on **28-Feb-2026**. [Read announcement and view images](/posts/2026/02/28/sastra-mahamana-award.html).
    sa: |
      **प्रो. आर्. एन्. अय्यङ्गारः** २०१२ तमे वर्षे जैनविश्वविद्यालये स्थापितस्य पुरातनेतिहास-संस्कृति-केन्द्रस्य (CAHC) संस्थापकः, विशिष्टाचार्यः, मार्गदर्शकश्च अस्ति। सः भारते विज्ञानस्य इतिहाससहितं भारतीयज्ञानपद्धत्याः क्षेत्रे निरन्तरं शोधकार्यं करोति।

      प्रो. अय्यङ्गारः (जन्म १९४३) भूकम्प-अभियान्त्रिकी, संरचना-गतिकी तथा अरैखिकप्रणालीनां क्षेत्रे स्वकीययोगदानाय प्रसिद्धः अस्ति। १९६९ तः २००५ तमे वर्षे निवृत्तिपर्यन्तं भारतीयविज्ञानसंस्थाने (IISc) प्राध्यापकरूपेण तेन २०० तः अधिकाः शोधपत्राणि, ग्रन्थाश्च प्रकाषिते। सः **भारतीयराष्ट्रिय-अभियान्त्रिकी-अकादम्याः, भारतीयविज्ञान-अकादम्याः, राष्ट्रियविज्ञान-अकादम्याः** च सदस्यः (Fellow) वर्तते। सः CBRI-CSIR इत्यस्य निदेशकः (१९९४-२०००), आणविकोर्जाविभागस्य राजारमण-फेलो (२००५-२०१०) च आसीत्।

      संस्कृतविदुषां कुले लब्धजन्मा प्रो. अय्यङ्गारः पारम्परिकपद्धत्या संस्कृतस्य प्रारम्भिकं शिक्षणं प्राप्तवान्। आधुनिकपद्धतिभिः सह भारतीयज्ञानपरम्पराणां मेलनेन तेन प्राचीनभारतीयविरासतस्य नूतना अध्ययनसरणिः विकसिता। वैदिकसाहित्ये केतवः, ग्रहणानि, भूकम्पाः, ध्रुवनक्षत्रं, तथा च शास्त्रीयसङ्गीते सम्भाव्यतासिद्धान्तः इत्यादिषु विषयेषु तेषां संशोधनानि जगत्प्रसिद्धानि सन्ति। तेन संस्कृतग्रन्थौ **पराशरतन्त्रम्** **नारदशिल्पशास्त्रम्** च सानुवादं सम्पादितौ। सम्प्रति सः **वृद्धगार्गीयज्योतिषस्य** हस्तलेखानां समीक्षात्मकसम्पादनं करोति।

      **सद्यःसम्माननम्:** २८-फरवरी-२०२६ दिनाङ्के शास्त्र-विश्वविद्यालयद्वारा प्रो. अय्यङ्गारमहोदस्य कृते **शास्त्र-महामना पुरस्कारः** प्रदत्तः। [विशेषवृत्तान्तं पश्यन्तु](/posts/2026/02/28/sastra-mahamana-award.html)।
