- name: "R S Hariharan"
  role: "Assistant Professor"
  image: "/assets/hari-2025.png"
  group: "team"
  email: "hariharan.rs@jainuniversity.ac.in"
  bio: |
    **Dr. R S Hariharan** is an Assistant Professor at CAHC. A telecommunications engineer by training, with prior experience in security research at the Indian Institute of Science and in the software industry, he subsequently earned a master's degree and a doctorate in Sanskrit. His work spans Sanskrit literature and poetics, the history of Indian astronomy and science, and India's civilisational thought. His interests include the interface of leadership studies and Sanskrit literature
